<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

    <!-- css file -->
    <link rel="stylesheet" href="style.css" />

    <!-- font-awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="container mx-auto">
    <section>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <div class="flex items-center gap-1">
            <i class="fa-brands fa-github text-4xl"></i>
            <p class="text-xl font-bold">GitHub Issues Tracker</p>
          </div>
        </div>
        <div class="flex gap-2">
          <div>
            <span class=""><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
          </div>
          <div class="dropdown dropdown-end">
            <button class="btn btn-primary">Search Issue</button>
          </div>
        </div>
      </div>
    </section>

    <section class="my-10 flex justify-start border border-gray-100 shadow-sm p-6 rounded-2xl">
        <div class="flex items-center gap-3">
            <button id="all-btn" class="btn join-item px-8 bg-[#4A00FF] border border-gray-300 text-white rounded-xl hover:bg-black">
                All
            </button>
            <button id="open-btn" class="btn join-item px-8 bg-white text-gray-600 border border-gray-300 rounded-xl hover:bg-black hover:text-white">
                Open
            </button>
            <button id="closed-btn" class="btn join-item px-8 bg-white text-gray-600 border border-gray-300 rounded-xl hover:bg-black  hover:text-white">
                Closed
            </button>   
        </div>
    </section>

    

  </body>
</html>
