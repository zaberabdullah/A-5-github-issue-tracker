<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

    <!-- css file -->
    <link rel="stylesheet" href="style.css" />

    <!-- font-awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div>
      <div class="w-full card max-w-[420px] bg-white shadow-xl p-8">
        <div class="flex flex-col items-center mb-8 text-center">
          <img src="assets/github-logo.png" alt="" class="mb-4" />
          <h1 class="text-3xl font-bold text-slate-800">GitHub Issues Tracker</h1>
          <p class="text-slate-500 text-sm mt-2">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-5">
          <div class="form-control w-full">
            <label class="text-sm font-semibold text-slate-700">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter Username"
              class="input input-bordered w-full focus:input-primary rounded-xl"
            />
            <span class="text-xs text-primary mt-1 font-medium">Default: admin</span>
          </div>

          <div class="form-control w-full">
            <label class="text-sm font-semibold text-slate-700">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              class="input input-bordered w-full focus:input-primary rounded-xl"
            />
            <span class="text-xs text-primary mt-1 font-medium">Default: admin123</span>
          </div>

          <button type="submit" class="btn btn-primary w-full text-white mt-2 rounded-xl">Sign In</button>
        </form>

        <div class="divider text-xs my-6">
            OR
        </div>
        <div class="bg-slate-50 p-5 rounded-xl text-center border border-slate-100">
            <p class="text-xs text-slate-700 font-bold mb-3">Demo Credentials:</p>
            <div class="space-y-1">
                <p class="text-sm text-slate-700"><span class="font-bold text-slate-950">Username:</span>admin</p>
                <p class="text-sm text-slate-700"><span class="font-bold text-slate-950">Password</span>admin123</p>
            </div>
        </div>
      </div>
    </div>

    <script src="script/login.js"></script>
  </body>
</html>
